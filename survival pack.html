<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Survival Pack - Lucky Survivor Edition</title>
    <style>
        :root {
            --primary-red: #d90429;
            --success-green: #2b9348;
            --fail-bg: #ffe5ec;
            --success-bg: #e7f5ff;
            --dark-blue: #2b2d42;
            --light-gray: #edf2f4;
            --tag-font-size: 1.5rem;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
            background-color: var(--light-gray);
            color: var(--dark-blue);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* 防止撒花溢出 */
        }

        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 3.2rem; color: var(--primary-red); margin: 0; text-shadow: 2px 2px 0px white; }

        /* 頂部大提示 */
        #toast-notice {
            position: fixed;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-red);
            color: white;
            padding: 25px 70px;
            border-radius: 60px;
            font-size: 2.5rem;
            font-weight: bold;
            z-index: 7000;
            transition: top 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        /* 主畫面佈局 */
        .main-layout { display: flex; gap: 20px; width: 98vw; max-width: 1750px; margin-bottom: 10px; z-index: 10; }
        .baskets-area { flex: 1.1; display: flex; flex-direction: column; gap: 10px; }
        .basket { background: white; border: 5px solid var(--dark-blue); border-radius: 20px; padding: 15px 20px; min-height: 170px; box-shadow: 8px 8px 0px var(--dark-blue); display: flex; flex-direction: column; }
        .basket.drag-over { background: #fff0f0; transform: scale(1.02); border-style: dashed; }
        .basket-title { font-size: 1.6rem; font-weight: 900; margin-bottom: 10px; border-bottom: 3px solid var(--primary-red); display: flex; justify-content: space-between; align-items: center; }
        .item-list { flex-grow: 1; display: flex; flex-wrap: wrap; gap: 10px; align-content: flex-start; }

        /* 字庫區 */
        .word-bank-area { flex: 1; background: rgba(255, 255, 255, 0.8); border: 4px dashed #999; border-radius: 20px; padding: 15px; height: 600px; overflow-y: auto; }
        #word-bank { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .word-tag { background: white; border: 2px solid var(--dark-blue); padding: 10px 18px; border-radius: 50px; cursor: grab; font-size: var(--tag-font-size); font-weight: bold; box-shadow: 3px 3px 0px rgba(0,0,0,0.1); transition: 0.2s; }
        .word-tag:hover { transform: scale(1.08); background: #fdfdfd; }

        /* 按鈕區 */
        .actions-footer { width: 100%; display: flex; justify-content: center; gap: 30px; padding: 10px 0 30px 0; z-index: 10; }
        .btn { padding: 18px 50px; font-size: 2rem; font-weight: bold; border-radius: 60px; cursor: pointer; border: none; box-shadow: 0 8px 0px rgba(0,0,0,0.2); transition: 0.2s; }
        #check-btn { background: var(--primary-red); color: white; }
        #reset-btn { background: #94a3b8; color: white; }

        /* 結局大彈窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 5000; justify-content: center; align-items: center; }
        .modal-content { width: 85%; max-width: 1000px; padding: 45px; border-radius: 50px; text-align: center; position: relative; border: 15px solid white; transition: 0.3s; }
        .result-success { background-color: var(--success-bg); border-color: var(--success-green); }
        .result-fail { background-color: var(--fail-bg); border-color: var(--primary-red); }

        /* 天選之子特效標題 */
        #miracle-title {
            display: none;
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow-bg 2s linear infinite, glow 1s ease-in-out infinite alternate;
            margin-bottom: 20px;
        }
        @keyframes rainbow-bg { to { background-position: 200% center; } }
        @keyframes glow { from { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #e60073; } to { text-shadow: 0 0 20px #fff, 0 0 30px #ff4da6, 0 0 40px #ff4da6; } }

        .result-icon { font-size: 8rem; margin-bottom: 5px; }
        .result-title { font-size: 4rem; margin: 5px 0; font-weight: 900; }
        .result-desc { font-size: 2.2rem; line-height: 1.3; font-weight: bold; }

        /* 碎紙特效容器 */
        #confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6000; display: none; }
        .confetti { position: absolute; width: 15px; height: 15px; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

        /* 挽救機制 */
        #revive-btn { background: linear-gradient(45deg, #ff9f43, #ff6b6b); color: white; padding: 20px 40px; font-size: 1.8rem; animation: pulse 1.5s infinite; display: none; margin: 15px auto; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        #quiz-container { display: none; margin-top: 15px; }
        .quiz-question { font-size: 2rem; font-weight: bold; margin-bottom: 20px; color: #1d3557; background: white; padding: 15px; border-radius: 15px; }
        .quiz-options { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .opt-btn { width: 85%; padding: 12px; font-size: 1.6rem; border-radius: 12px; border: 2px solid var(--dark-blue); background: white; cursor: pointer; font-weight: bold; }
        .correct-ans { background-color: var(--success-green) !important; color: white !important; }
        .wrong-ans { background-color: var(--primary-red) !important; color: white !important; }
    </style>
</head>
<body>

    <div id="toast-notice">Bag is full! 🎒</div>
    <div id="confetti-container"></div>

    <header><h1>🎒 My Survival Pack</h1></header>

    <div class="main-layout">
        <div class="baskets-area">
            <div class="basket" id="basket-1" data-max="5">
                <div class="basket-title">1: the most important <span class="capacity-info">MAX 5</span></div>
                <div class="item-list" id="list-1"></div>
            </div>
            <div class="basket" id="basket-2" data-max="5">
                <div class="basket-title">2: It can save me <span class="capacity-info">MAX 5</span></div>
                <div class="item-list" id="list-2"></div>
            </div>
            <div class="basket" id="basket-3" data-max="5">
                <div class="basket-title">3: It's OK to have it <span class="capacity-info">MAX 5</span></div>
                <div class="item-list" id="list-3"></div>
            </div>
        </div>

        <div class="word-bank-area">
            <div id="word-bank"></div>
        </div>
    </div>

    <div class="actions-footer">
        <button id="check-btn" class="btn">Check Survival Rate</button>
        <button id="reset-btn" class="btn">Next Round (Reset)</button>
    </div>

    <div class="modal" id="result-modal">
        <div class="modal-content" id="modal-box">
            <div id="miracle-title">🍀 MIRACLE! 天選之子大逆轉！</div>
            <div id="scenario-label" style="font-size: 1.4rem; font-weight: 900; color: #555;">SCENARIO</div>
            <div class="result-icon" id="result-icon">✨</div>
            <h2 class="result-title" id="result-title">SUCCESS</h2>
            <p class="result-desc" id="result-desc"></p>
            
            <button id="revive-btn" class="btn" onclick="startQuiz()">🔥 Last Chance to Revive (英文挽救機會)</button>

            <div id="quiz-container">
                <div class="quiz-question" id="quiz-q">Question?</div>
                <div class="quiz-options">
                    <button class="opt-btn" onclick="checkAnswer(0)" id="opt0">A</button>
                    <button class="opt-btn" onclick="checkAnswer(1)" id="opt1">B</button>
                    <button class="opt-btn" onclick="checkAnswer(2)" id="opt2">C</button>
                </div>
            </div>

            <button id="close-modal-btn" class="btn" style="margin-top:20px; background: var(--dark-blue); color:white; font-size: 1.4rem;" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'drop') { osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(10, now + 0.1); gain.gain.setValueAtTime(0.1, now); osc.start(); osc.stop(now + 0.1); }
            else if (type === 'error') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now); gain.gain.setValueAtTime(0.2, now); osc.start(); osc.stop(now + 0.3); }
            else if (type === 'win') { [523, 783, 1046].forEach((f, i) => { const o = audioCtx.createOscillator(); o.connect(audioCtx.destination); o.frequency.setValueAtTime(f, now + i*0.1); o.start(now + i*0.1); o.stop(now + i*0.1 + 0.4); }); }
            else if (type === 'fail') { osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.linearRampToValueAtTime(50, now + 0.6); gain.gain.setValueAtTime(0.1, now); osc.start(); osc.stop(now + 0.6); }
        }

        // --- Confetti 特效 ---
        function spawnConfetti() {
            const container = document.getElementById('confetti-container');
            container.style.display = 'block';
            container.innerHTML = '';
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
            const icons = ['🌸', '✨', '🎉', '🌟', '🍀'];
            for (let i = 0; i < 100; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                if (Math.random() > 0.3) {
                    conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                } else {
                    conf.textContent = icons[Math.floor(Math.random() * icons.length)];
                    conf.style.fontSize = '20px';
                }
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-20px';
                conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
                conf.style.animationDelay = (Math.random() * 2) + 's';
                container.appendChild(conf);
            }
        }

        const baseWords = ["tissue paper", "raincoat", "flashlight", "headphone", "charger", "radio", "mask", "Apple watch", "tofu", "glove", "coat", "your phone", "hamburger", "movie ticket", "a pair of glasses", "WI-FI", "ice", "my dog", "cash", "basketball", "water bottle", "coin", "cola", "chiikawa", "towel", "key", "shoes", "iPad mini", "battery", "sunglasses", "cap", "poker", "wallet", "camp", "pillow", "a rock", "your photo", "chocolate", "cookie", "fish", "ice cream", "uniform", "lighter", "mug", "spaghetti", "your favorite teacher", "clock", "PS5", "chair", "t-shirt", "manga", "id card", "umbrella", "novel", "laptop", "video game", "your homework", "lipstick", "hot dog", "medicine", "plush toy"];
        const newWords = ["whistle", "canned food", "first-aid kit", "sleeping bag", "power bank", "Nintendo Switch", "selfie stick", "a gold bar", "perfume", "bubble tea", "sushi", "a giant mirror", "skateboard", "a potted plant"];
        const wordList = [...baseWords, ...newWords];

        const quizBank = {
            'A': { q: "It's dark. Which tool can emit light?", options: ["headphone", "flashlight", "battery"], correct: 1 },
            'B': { q: "Your arm is bleeding. What do you need?", options: ["medicine", "chocolate", "tissue paper"], correct: 0 },
            'C': { q: "Which item stores clean water?", options: ["water bottle", "mug", "cola"], correct: 0 },
            'D': { q: "Wear a waterproof _______ in heavy rain.", options: ["t-shirt", "coat", "raincoat"], correct: 2 },
            'E': { q: "Need carbohydrates to recharge. Eat _______.", options: ["spaghetti", "ice", "a rock"], correct: 0 },
            'F': { q: "Protect your lungs from smoke with a ______.", options: ["cap", "mask", "sunglasses"], correct: 1 },
            'G': { q: "What provides emotional comfort?", options: ["PS5", "cash", "plush toy"], correct: 2 },
            'H': { q: "Who can bark to help rescuers find you?", options: ["my dog", "your favorite teacher", "id card"], correct: 0 }
        };

        let currentScenarioId = 'A'; let draggedItem = null;

        function init() {
            const wb = document.getElementById('word-bank'); wb.innerHTML = '';
            wordList.sort(() => Math.random() - 0.5);
            wordList.forEach(w => {
                const tag = document.createElement('div'); tag.className = 'word-tag'; tag.textContent = w; tag.draggable = true;
                tag.addEventListener('dragstart', function() { draggedItem = this; this.style.opacity = '0.3'; });
                tag.addEventListener('dragend', function() { this.style.opacity = '1'; });
                wb.appendChild(tag);
            });
        }

        document.querySelectorAll('.item-list, #word-bank').forEach(zone => {
            zone.addEventListener('dragover', e => e.preventDefault());
            zone.addEventListener('drop', function(e) {
                e.preventDefault();
                const basket = this.closest('.basket');
                if (basket && this.children.length >= 5) {
                    const toast = document.getElementById('toast-notice'); toast.style.top = '60px'; playSound('error');
                    setTimeout(() => toast.style.top = '-150px', 2000); return;
                }
                this.appendChild(draggedItem); playSound('drop');
            });
        });

        document.getElementById('check-btn').addEventListener('click', () => {
            const items = Array.from(document.querySelectorAll('.basket .word-tag')).map(t => t.textContent);
            if (items.length === 0) return;

            const scenarios = [
                { id: 'A', title: "POWER OUTAGE (停電)", need: ['flashlight', 'Apple watch', 'power bank', 'your phone'], ok: "You have light! You survive! 💡", fail: "It's too dark!" },
                { id: 'B', title: "INJURED (受傷)", need: ['medicine', 'tissue paper', 'first-aid kit'], ok: "You treated the wound! 🎉", fail: "No medical supplies!" },
                { id: 'C', title: "THIRSTY (缺水)", need: ['water bottle', 'cola'], ok: "Refreshing! You have water! 💧", fail: "No water!" },
                { id: 'D', title: "COLD WAVE (寒流)", need: ['coat', 'raincoat', 'sleeping bag'], ok: "You stay warm! 🔥", fail: "Too cold!" },
                { id: 'E', title: "HUNGRY (飢餓)", need: ['cookie', 'spaghetti', 'hamburger', 'canned food'], ok: "Yummy! You have energy! 🍫", fail: "No food!" },
                { id: 'F', title: "ESCAPE (逃生)", need: ['mask', 'shoes'], ok: "You escaped safely! 🏃‍♂️", fail: "Cut by glass!" },
                { id: 'G', title: "PANIC (孤獨)", need: ['plush toy', 'chiikawa', 'your photo', 'Nintendo Switch'], ok: "You are calm! 🥰", fail: "Too lonely!" },
                { id: 'H', title: "RESCUE (救援)", need: ['my dog', 'radio', 'your phone', 'whistle'], ok: "Found by rescuers! 🐶", fail: "Nobody knows!" }
            ];

            const s = scenarios[Math.floor(Math.random() * scenarios.length)];
            currentScenarioId = s.id;
            let isWin = s.need.some(n => items.includes(n));
            let finalDesc = isWin ? s.ok : s.fail;
            let isMiracle = false;

            // --- 天選之子判斷 (排除三大救命物資) ---
            const hasBig3 = items.includes('water bottle') || items.includes('medicine') || items.includes('flashlight');
            
            if (s.id === 'A' && items.includes('power bank') && items.includes('your phone')) {
                isWin = true; finalDesc = "Your phone has full power! Use the flashlight and call for help! 📱🔋✨";
                if (!hasBig3) isMiracle = true;
            }
            if (s.id === 'C' && items.includes('bubble tea')) { isWin = false; finalDesc = "Bubble tea makes you thirstier! 🤢"; }
            if (s.id === 'E' && items.includes('sushi')) {
                const safe = ['cookie', 'spaghetti', 'hamburger', 'canned food', 'chocolate'];
                if (!safe.some(f => items.includes(f))) { isWin = false; finalDesc = "Sushi went bad! Stomachache! 🤢"; }
            }
            if (s.id === 'G' && items.includes('Nintendo Switch')) {
                isWin = true; finalDesc = "Playing Nintendo Switch! You feel calm and happy! 🎮🎉";
                if (!hasBig3) isMiracle = true;
            }

            // 更新介面
            const modalBox = document.getElementById('modal-box');
            const miracleLabel = document.getElementById('miracle-title');
            
            modalBox.className = 'modal-content ' + (isWin ? 'result-success' : 'result-fail');
            document.getElementById('scenario-label').textContent = "SCENARIO: " + s.title;
            document.getElementById('result-icon').textContent = isWin ? "🌟" : "💀";
            document.getElementById('result-title').textContent = isWin ? "SUCCESS!" : "FAILED...";
            document.getElementById('result-desc').textContent = finalDesc;
            
            if (isMiracle && isWin) {
                miracleLabel.style.display = 'block';
                spawnConfetti();
                playSound('win');
            } else {
                miracleLabel.style.display = 'none';
                document.getElementById('confetti-container').style.display = 'none';
                playSound(isWin ? 'win' : 'fail');
            }

            document.getElementById('revive-btn').style.display = isWin ? 'none' : 'block';
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-desc').style.display = 'block';
            document.getElementById('result-modal').style.display = 'flex';
        });

        function startQuiz() {
            document.getElementById('revive-btn').style.display = 'none';
            document.getElementById('result-desc').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            const qData = quizBank[currentScenarioId];
            document.getElementById('quiz-q').textContent = qData.q;
            qData.options.forEach((opt, i) => {
                const btn = document.getElementById('opt' + i); btn.textContent = opt; btn.disabled = false; btn.className = 'opt-btn';
            });
        }

        function checkAnswer(idx) {
            const qData = quizBank[currentScenarioId];
            document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
            if (idx === qData.correct) {
                document.getElementById('opt' + idx).classList.add('correct-ans');
                setTimeout(() => {
                    document.getElementById('modal-box').className = 'modal-content result-success';
                    document.getElementById('result-icon').textContent = "🎉";
                    document.getElementById('result-title').textContent = "REVIVED!";
                    document.getElementById('quiz-container').style.display = 'none';
                    document.getElementById('result-desc').style.display = 'block';
                    document.getElementById('result-desc').textContent = "Revived! You are a survivor! 🎉";
                    playSound('win');
                }, 800);
            } else {
                document.getElementById('opt' + idx).classList.add('wrong-ans');
                setTimeout(() => {
                    document.getElementById('result-title').textContent = "GAME OVER";
                    playSound('fail');
                }, 800);
            }
        }

        function closeModal() { document.getElementById('result-modal').style.display = 'none'; document.getElementById('confetti-container').style.display = 'none'; }
        document.getElementById('reset-btn').addEventListener('click', () => { 
            document.querySelectorAll('.basket .word-tag').forEach(t => document.getElementById('word-bank').appendChild(t)); 
            playSound('drop'); 
        });
        init();
    </script>
</body>
</html>
