<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Survival Pack - Click-to-Place Edition</title>
    <style>
        :root {
            --primary-red: #d90429;
            --success-green: #2b9348;
            --fail-bg: #ffe5ec;
            --success-bg: #e7f5ff;
            --dark-blue: #2b2d42;
            --light-gray: #edf2f4;
            --accent-yellow: #ffbe0b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
            background-color: var(--light-gray);
            color: var(--dark-blue);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }

        h1 { font-size: clamp(1.2rem, 4vw, 2.2rem); color: var(--primary-red); margin: 0; }

        /* 主容器佈局 */
        .main-container {
            display: flex;
            flex-direction: row; /* 平板與電腦左右排 */
            gap: 15px;
            padding: 10px;
            flex-grow: 1;
            min-height: 0;
        }

        /* 籃子區 */
        .baskets-area {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }

        .basket {
            background: white;
            border: 3px solid var(--dark-blue);
            border-radius: 15px;
            padding: 8px;
            flex: 1;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--dark-blue);
            position: relative;
        }

        /* 當有單字被選中時，籃子呈現可點擊狀態 */
        body.has-selection .basket:hover {
            border-color: var(--primary-red);
            background: #fff8f8;
            transform: translateY(-2px);
        }

        .basket-title {
            font-size: 1rem;
            font-weight: 900;
            margin-bottom: 5px;
            border-bottom: 2px solid var(--primary-red);
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .item-list {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-content: flex-start;
            overflow-y: auto;
            pointer-events: none; /* 點擊由父層 basket 統一處理 */
        }

        /* 字庫區 */
        .word-bank-area {
            flex: 1;
            background: rgba(255, 255, 255, 0.7);
            border: 3px dashed #bbb;
            border-radius: 15px;
            padding: 10px;
            overflow-y: auto;
            cursor: pointer;
        }

        #word-bank {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            pointer-events: none;
        }

        /* 單字標籤 */
        .word-tag {
            background: white;
            border: 2px solid var(--dark-blue);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            user-select: none;
            font-size: clamp(0.85rem, 2vw, 1.1rem);
            font-weight: bold;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
            transition: all 0.2s;
            pointer-events: auto; /* 確保單字本身可被點擊選取 */
        }

        /* 選中效果 */
        .word-tag.selected {
            background-color: var(--accent-yellow);
            border-color: var(--primary-red);
            box-shadow: 0 0 15px var(--accent-yellow);
            transform: scale(1.1);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.7; }
        }

        /* 底部按鈕 */
        .footer-actions {
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: white;
            border-top: 1px solid #ddd;
            padding: 0 10px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 0px rgba(0,0,0,0.2);
            transition: 0.1s;
        }

        #check-btn { background: var(--primary-red); color: white; }
        #reset-btn { background: #94a3b8; color: white; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0px rgba(0,0,0,0.2); }

        /* 手機 RWD 切換上下排列 */
        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .baskets-area { flex: 1.6; }
            .word-bank-area { flex: 1; }
        }

        /* 彈窗設計 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 30px; text-align: center; position: relative; }
        #miracle-title { font-size: 1.8rem; font-weight: 900; color: #ff9f43; text-shadow: 0 0 10px gold; margin-bottom: 10px; display: none; }
        
        #toast-notice { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--primary-red); color: white; padding: 10px 30px; border-radius: 30px; z-index: 11000; transition: 0.4s; font-weight: bold; }
        #confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body id="game-body">

    <div id="toast-notice">Bag full! 🎒</div>
    <div id="confetti-container"></div>

    <header><h1>🎒 My Survival Pack</h1></header>

    <div class="main-container">
        <!-- 籃子區 -->
        <div class="baskets-area">
            <div class="basket" id="basket-1" onclick="moveSelected(this)">
                <div class="basket-title">1: the most important <span style="color:var(--primary-red)">MAX 5</span></div>
                <div class="item-list" id="list-1"></div>
            </div>
            <div class="basket" id="basket-2" onclick="moveSelected(this)">
                <div class="basket-title">2: It can save me <span style="color:var(--primary-red)">MAX 5</span></div>
                <div class="item-list" id="list-2"></div>
            </div>
            <div class="basket" id="basket-3" onclick="moveSelected(this)">
                <div class="basket-title">3: It's OK to have it <span style="color:var(--primary-red)">MAX 5</span></div>
                <div class="item-list" id="list-3"></div>
            </div>
        </div>

        <!-- 字庫區 -->
        <div class="word-bank-area" id="word-bank-container" onclick="moveSelected(this)">
            <div id="word-bank"></div>
        </div>
    </div>

    <!-- 底部按鈕區 -->
    <div class="footer-actions">
        <button id="check-btn" class="btn" onclick="checkSurvival()">Check Survival Rate</button>
        <button id="reset-btn" class="btn" onclick="resetGame()">Next Round (Reset)</button>
    </div>

    <!-- 彈窗系統 -->
    <div class="modal" id="result-modal">
        <div class="modal-content">
            <div id="miracle-title">🍀 MIRACLE! 天選之子大逆轉！</div>
            <div id="scenario-label" style="font-weight: bold; color: #888;">SCENARIO</div>
            <div id="result-icon" style="font-size: 5rem;">✨</div>
            <h2 id="result-title">SUCCESS</h2>
            <p id="result-desc" style="font-size: 1.2rem; font-weight: bold;"></p>
            
            <div id="quiz-area" style="display:none; text-align: left; background: #f0f0f0; padding: 15px; border-radius: 15px; margin-top: 10px;">
                <p id="quiz-q" style="font-weight: bold;"></p>
                <div id="quiz-opts"></div>
            </div>

            <button id="revive-btn" class="btn" style="display:none; background: orange; color:white; margin: 10px 0; width: 100%;" onclick="startRevive()">🔥 Last Chance Revive</button>
            <button class="btn" style="background: var(--dark-blue); color:white; width: 100%; margin-top: 10px;" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        // 音效
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playS(t){
            if(audioCtx.state==='suspended')audioCtx.resume();
            const o=audioCtx.createOscillator(),g=audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            if(t==='click'){o.frequency.setValueAtTime(800,0); o.frequency.exponentialRampToValueAtTime(400,0.1); g.gain.setValueAtTime(0.05,0); o.start(); o.stop(0.1);}
            if(t==='pop'){o.frequency.setValueAtTime(400,0); o.frequency.exponentialRampToValueAtTime(900,0.1); g.gain.setValueAtTime(0.1,0); o.start(); o.stop(0.1);}
            if(t==='error'){o.type='sawtooth'; o.frequency.setValueAtTime(120,0); g.gain.setValueAtTime(0.1,0); o.start(); o.stop(0.2);}
        }

        const wordList = ["medicine","whistle", "canned food", "first-aid kit", "sleeping bag", "power bank", "Nintendo Switch", "selfie stick", "gold bar", "perfume", "bubble tea", "sushi", "mirror", "skateboard", "potted plant", "tissue paper", "raincoat", "flashlight", "headphone", "charger", "radio", "mask", "Apple watch", "tofu", "glove", "coat", "your phone", "hamburger", "movie ticket", "glasses", "WI-FI", "ice", "my dog", "cash", "basketball", "water bottle", "coin", "cola", "chiikawa", "towel", "key", "shoes", "iPad mini", "battery", "sunglasses", "cap", "poker", "wallet", "camp", "pillow", "a rock", "your photo", "chocolate", "cookie", "fish", "ice cream", "uniform", "lighter", "mug", "spaghetti", "teacher", "clock", "PS5", "chair", "t-shirt", "manga", "id card", "umbrella", "novel", "laptop", "video game", "homework", "lipstick", "hot dog"];
        const quizBank = { 'A':{q:"Dark! Which tool emits light?", o:["headphone","flashlight","battery"], c:1}, 'B':{q:"Bleeding! What to treat wound?", o:["medicine","chocolate","tissue paper"], c:0}, 'C':{q:"Stores clean water?", o:["water bottle","mug","cola"], c:0}, 'D':{q:"Heavy rain! Wear a _______.", o:["t-shirt","coat","raincoat"], c:2}, 'E':{q:"Hungry! Energy food?", o:["spaghetti","ice","rock"], c:0}, 'F':{q:"Smoke! Wear a ______.", o:["cap","mask","sunglasses"], c:1}, 'G':{q:"Anxious! Comfort item?", o:["PS5","cash","plush toy"], c:2}, 'H':{q:"Bark to help rescuers?", o:["my dog","teacher","id card"], c:0}};

        let selectedTag = null;
        let currentScenarioId = 'A';

        // 初始化
        function init() {
            const wb = document.getElementById('word-bank');
            wordList.sort(()=>Math.random()-0.5).forEach(word => {
                const tag = document.createElement('div');
                tag.className = 'word-tag';
                tag.textContent = word;
                tag.onclick = (e) => {
                    e.stopPropagation();
                    selectTag(tag);
                };
                wb.appendChild(tag);
            });
        }

        // 點擊選擇單字
        function selectTag(tag) {
            playS('click');
            if (selectedTag) selectedTag.classList.remove('selected');
            
            if (selectedTag === tag) {
                selectedTag = null;
                document.getElementById('game-body').classList.remove('has-selection');
            } else {
                selectedTag = tag;
                selectedTag.classList.add('selected');
                document.getElementById('game-body').classList.add('has-selection');
            }
        }

        // 點擊籃子或字庫移動單字
        function moveSelected(container) {
            if (!selectedTag) return;

            const list = container.classList.contains('word-bank-area') ? 
                         document.getElementById('word-bank') : 
                         container.querySelector('.item-list');

            // 容量檢查
            if (!container.classList.contains('word-bank-area') && list.children.length >= 5) {
                showT("🚫 Bag Full!");
                playS('error');
                return;
            }

            list.appendChild(selectedTag);
            playS('pop');
            selectedTag.classList.remove('selected');
            selectedTag = null;
            document.getElementById('game-body').classList.remove('has-selection');
        }

        function showT(m){ 
            const t=document.getElementById('toast-notice'); 
            t.textContent=m; t.style.top='20px'; 
            setTimeout(()=>t.style.top='-100px',2000); 
        }

        function checkSurvival() {
            const items = Array.from(document.querySelectorAll('.basket .word-tag')).map(t => t.textContent);
            if(items.length===0) { showT("Bag is empty!"); return; }

            const scens = [
                {id:'A',t:"POWER OUTAGE", n:['flashlight','power bank','your phone']},
                {id:'B',t:"INJURED", n:['medicine','first-aid kit']},
                {id:'C',t:"THIRSTY", n:['water bottle','cola']},
                {id:'D',t:"COLD WAVE", n:['coat','raincoat','sleeping bag']},
                {id:'E',t:"HUNGRY", n:['cookie','hamburger','canned food']},
                {id:'F',t:"ESCAPE", n:['mask','shoes']},
                {id:'G',t:"PANIC", n:['plush toy','Nintendo Switch']},
                {id:'H',t:"RESCUE", n:['my dog','radio','whistle']}
            ];

            const s = scens[Math.floor(Math.random()*scens.length)];
            currentScenarioId = s.id;
            let win = s.n.some(n => items.includes(n));
            let desc = win ? "You Survived! 🎉" : "Mission failed... 💀";
            let miracle = false;

            if(s.id==='A' && items.includes('power bank') && items.includes('your phone')) win=true;
            if(s.id==='C' && items.includes('bubble tea')) { win=false; desc="Bubble tea is too sweet! 🤢"; }
            if(s.id==='G' && items.includes('Nintendo Switch')) win=true;

            // 天選之子判斷
            const big3 = ['water bottle','medicine','flashlight'];
            if(win && !big3.some(b => items.includes(b))) miracle = true;

            document.getElementById('result-modal').style.display = 'flex';
            document.getElementById('scenario-label').textContent = s.t;
            document.getElementById('result-icon').textContent = win ? "🌟" : "💀";
            document.getElementById('result-title').textContent = win ? "SUCCESS" : "FAILED";
            document.getElementById('result-desc').textContent = desc;
            document.getElementById('miracle-title').style.display = miracle ? 'block' : 'none';
            document.getElementById('revive-btn').style.display = win ? 'none' : 'block';
            document.getElementById('quiz-area').style.display = 'none';

            if(miracle) spawnConfetti();
        }

        function startRevive() {
            document.getElementById('revive-btn').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            const q = quizBank[currentScenarioId];
            document.getElementById('quiz-q').textContent = q.q;
            const opts = document.getElementById('quiz-opts'); opts.innerHTML = '';
            q.o.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = 'opt-btn';
                b.textContent = o;
                b.onclick = () => {
                    if(i === q.c) { showT("Correct! 🎉"); closeModal(); }
                    else { b.style.background = 'red'; b.style.color = 'white'; b.disabled = true; }
                };
                opts.appendChild(b);
            });
        }

        function closeModal(){ document.getElementById('result-modal').style.display='none'; }
        
        function resetGame() {
            document.querySelectorAll('.basket .word-tag').forEach(t => {
                document.getElementById('word-bank').appendChild(t);
            });
            selectedTag = null;
        }

        function spawnConfetti(){
            const c = document.getElementById('confetti-container'); c.innerHTML='';
            for(let i=0;i<50;i++){
                const d = document.createElement('div'); d.className='confetti';
                d.style.left=Math.random()*100+'vw'; d.style.backgroundColor='hsl('+Math.random()*360+',100%,50%)';
                d.style.animationDuration=(Math.random()*2+2)+'s'; c.appendChild(d);
            }
        }

        init();
    </script>
</body>
</html>
