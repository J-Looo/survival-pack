<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Survival Pack - Touch & Classroom Edition</title>
    <style>
        :root {
            --primary-red: #d90429;
            --success-green: #2b9348;
            --fail-bg: #ffe5ec;
            --success-bg: #e7f5ff;
            --dark-blue: #2b2d42;
            --light-gray: #edf2f4;
            --tag-font-size: 1.3rem;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
            background-color: var(--light-gray);
            color: var(--dark-blue);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh; /* 固定高度防止捲動 */
            box-sizing: border-box;
            overflow: hidden;
            touch-action: manipulation;
        }

        header { height: 60px; display: flex; align-items: center; justify-content: center; }
        h1 { font-size: 2.5rem; color: var(--primary-red); margin: 0; text-shadow: 2px 2px 0px white; }

        /* 主畫面佈局：自動適應螢幕剩餘空間 */
        .main-layout {
            display: flex;
            gap: 20px;
            width: 98vw;
            max-width: 1750px;
            height: calc(100vh - 180px); /* 扣除標題與按鈕區的高度 */
            margin-bottom: 10px;
        }

        .baskets-area {
            flex: 1.1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100%;
        }

        .basket {
            background: white;
            border: 4px solid var(--dark-blue);
            border-radius: 15px;
            padding: 10px 15px;
            flex: 1; /* 三個籃子均分空間 */
            box-shadow: 5px 5px 0px var(--dark-blue);
            display: flex;
            flex-direction: column;
            min-height: 0; /* 允許內容縮放 */
        }

        .basket.drag-over { background: #fff0f0; border-style: dashed; transform: scale(1.01); }

        .basket-title {
            font-size: 1.3rem;
            font-weight: 900;
            margin-bottom: 8px;
            border-bottom: 3px solid var(--primary-red);
            display: flex;
            justify-content: space-between;
        }

        .item-list {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-content: flex-start;
            overflow-y: auto;
        }

        /* 字庫區：增加滾動條確保按鈕不被擠下去 */
        .word-bank-area {
            flex: 1;
            background: rgba(255, 255, 255, 0.8);
            border: 3px dashed #999;
            border-radius: 20px;
            padding: 15px;
            overflow-y: auto;
            height: 100%;
        }

        #word-bank {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        /* 單字標籤：優化觸控體驗 */
        .word-tag {
            background: white;
            border: 2px solid var(--dark-blue);
            padding: 8px 16px;
            border-radius: 50px;
            cursor: grab;
            user-select: none;
            font-size: var(--tag-font-size);
            font-weight: bold;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.1);
            touch-action: none; /* 重要：防止觸控時網頁捲動 */
            position: relative;
            z-index: 100;
        }

        .word-tag.dragging {
            opacity: 0.5;
            transform: scale(1.1);
            position: fixed; /* 觸控拖曳時定位 */
            pointer-events: none; /* 穿透以檢測下方元素 */
            z-index: 1000;
        }

        /* 按鈕區：固定在底部 */
        .actions-footer {
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.6rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            border: none;
            box-shadow: 0 6px 0px rgba(0,0,0,0.2);
            transition: 0.2s;
        }

        #check-btn { background: var(--primary-red); color: white; }
        #reset-btn { background: #94a3b8; color: white; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0px rgba(0,0,0,0.2); }

        /* 大彈窗與特效... (保持先前的高品質設計) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 8000; justify-content: center; align-items: center; }
        .modal-content { width: 85%; max-width: 900px; padding: 40px; border-radius: 40px; text-align: center; border: 10px solid white; }
        #miracle-title { display: none; font-size: 2.2rem; font-weight: 900; background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: glow 1s infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 10px #fff; } to { text-shadow: 0 0 20px #ff4da6; } }
        
        #toast-notice { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--primary-red); color: white; padding: 15px 40px; border-radius: 40px; font-size: 2rem; font-weight: bold; z-index: 9000; transition: top 0.4s; }
        #confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 8500; }
        .confetti { position: absolute; width: 10px; height: 10px; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

        .opt-btn { width: 90%; padding: 12px; font-size: 1.4rem; margin: 5px; border-radius: 10px; border: 2px solid var(--dark-blue); background: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="toast-notice">Bag is full! 🎒</div>
    <div id="confetti-container"></div>

    <header><h1>🎒 My Survival Pack</h1></header>

    <div class="main-layout">
        <div class="baskets-area">
            <div class="basket" id="basket-1" data-max="5">
                <div class="basket-title">1: the most important <span style="color:var(--primary-red)">MAX 5</span></div>
                <div class="item-list" id="list-1"></div>
            </div>
            <div class="basket" id="basket-2" data-max="5">
                <div class="basket-title">2: It can save me <span style="color:var(--primary-red)">MAX 5</span></div>
                <div class="item-list" id="list-2"></div>
            </div>
            <div class="basket" id="basket-3" data-max="5">
                <div class="basket-title">3: It's OK to have it <span style="color:var(--primary-red)">MAX 5</span></div>
                <div class="item-list" id="list-3"></div>
            </div>
        </div>

        <div class="word-bank-area">
            <div id="word-bank"></div>
        </div>
    </div>

    <div class="actions-footer">
        <button id="check-btn" class="btn">Check Survival Rate</button>
        <button id="reset-btn" class="btn">Next Round (Reset)</button>
    </div>

    <div class="modal" id="result-modal">
        <div class="modal-content" id="modal-box">
            <div id="miracle-title">🍀 MIRACLE! 天選之子大逆轉！</div>
            <div class="result-icon" id="result-icon" style="font-size:6rem;">✨</div>
            <h2 id="result-title" style="font-size:3rem; margin:10px 0;">SUCCESS</h2>
            <p id="result-desc" style="font-size:1.8rem; font-weight:bold;"></p>
            <button id="revive-btn" class="btn" style="display:none; font-size:1.5rem; background:orange; color:white;" onclick="startQuiz()">🔥 Last Chance Revive</button>
            <div id="quiz-container" style="display:none; margin-top:20px;">
                <div id="quiz-q" style="font-size:1.5rem; margin-bottom:15px; background:white; padding:10px; border-radius:10px;"></div>
                <div class="quiz-options" id="quiz-opts"></div>
            </div>
            <button class="btn" style="margin-top:20px; background: var(--dark-blue); color:white; font-size:1.2rem; padding:10px 25px;" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(t){ if(audioCtx.state==='suspended')audioCtx.resume(); const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); const n=audioCtx.currentTime; if(t==='drop'){o.frequency.setValueAtTime(600,n); o.frequency.exponentialRampToValueAtTime(10,n+0.1); g.gain.setValueAtTime(0.1,n); o.start(); o.stop(n+0.1);} else if(t==='error'){o.type='sawtooth'; o.frequency.setValueAtTime(120,n); g.gain.setValueAtTime(0.2,n); o.start(); o.stop(n+0.3);} else if(t==='win'){[523,783,1046].forEach((f,i)=>{const oo=audioCtx.createOscillator(); oo.connect(audioCtx.destination); oo.frequency.setValueAtTime(f,n+i*0.1); oo.start(n+i*0.1); oo.stop(n+i*0.1+0.4);});} else if(t==='fail'){o.type='square'; o.frequency.setValueAtTime(150,n); o.frequency.linearRampToValueAtTime(50,n+0.6); g.gain.setValueAtTime(0.1,n); o.start(); o.stop(n+0.6);}}

        const wordList = ["medicine","whistle", "canned food", "first-aid kit", "sleeping bag", "power bank", "Nintendo Switch", "selfie stick", "a gold bar", "perfume", "bubble tea", "sushi", "a giant mirror", "skateboard", "a potted plant", "tissue paper", "raincoat", "flashlight", "headphone", "charger", "radio", "mask", "Apple watch", "tofu", "glove", "coat", "your phone", "hamburger", "movie ticket", "a pair of glasses", "WI-FI", "ice", "my dog", "cash", "basketball", "water bottle", "coin", "cola", "chiikawa", "towel", "key", "shoes", "iPad mini", "battery", "sunglasses", "cap", "poker", "wallet", "camp", "pillow", "a rock", "your photo", "chocolate", "cookie", "fish", "ice cream", "uniform", "lighter", "mug", "spaghetti", "your favorite teacher", "clock", "PS5", "chair", "t-shirt", "manga", "id card", "umbrella", "novel", "laptop", "video game", "your homework", "lipstick", "hot dog"];
        const quizBank = { 'A':{q:"Dark! Which tool emits light?", o:["headphone","flashlight","battery"], c:1}, 'B':{q:"Bleeding! What to treat wound?", o:["medicine","chocolate","tissue paper"], c:0}, 'C':{q:"Stores clean water?", o:["water bottle","mug","cola"], c:0}, 'D':{q:"Heavy rain! Wear a _______.", o:["t-shirt","coat","raincoat"], c:2}, 'E':{q:"Hungry! Energy food?", o:["spaghetti","ice","rock"], c:0}, 'F':{q:"Smoke! Wear a ______.", o:["cap","mask","sunglasses"], c:1}, 'G':{q:"Anxious! Comfort item?", o:["PS5","cash","plush toy"], c:2}, 'H':{q:"Bark to help rescuers?", o:["my dog","teacher","id card"], c:0}};

        let draggedItem = null;
        let currentScenarioId = 'A';

        // 初始化字庫
        function init() {
            const wb = document.getElementById('word-bank'); wb.innerHTML = '';
            wordList.sort(()=>Math.random()-0.5).forEach(w => {
                const tag = document.createElement('div');
                tag.className = 'word-tag'; tag.textContent = w;
                // 滑鼠拖曳
                tag.draggable = true;
                tag.addEventListener('dragstart', function(){ draggedItem = this; this.classList.add('dragging'); });
                tag.addEventListener('dragend', function(){ this.classList.remove('dragging'); });
                // 觸控拖曳
                tag.addEventListener('touchstart', handleTouchStart, {passive: false});
                tag.addEventListener('touchmove', handleTouchMove, {passive: false});
                tag.addEventListener('touchend', handleTouchEnd, {passive: false});
                wb.appendChild(tag);
            });
        }

        // --- 觸控引擎 ---
        let touchOffsetX = 0; let touchOffsetY = 0;
        function handleTouchStart(e) {
            draggedItem = e.target;
            const touch = e.touches[0];
            const rect = draggedItem.getBoundingClientRect();
            touchOffsetX = touch.clientX - rect.left;
            touchOffsetY = touch.clientY - rect.top;
            draggedItem.classList.add('dragging');
            e.preventDefault();
        }

        function handleTouchMove(e) {
            if (!draggedItem) return;
            const touch = e.touches[0];
            draggedItem.style.left = (touch.clientX - touchOffsetX) + 'px';
            draggedItem.style.top = (touch.clientY - touchOffsetY) + 'px';
            e.preventDefault();
        }

        function handleTouchEnd(e) {
            if (!draggedItem) return;
            draggedItem.classList.remove('dragging');
            draggedItem.style.left = ''; draggedItem.style.top = '';
            
            const touch = e.changedTouches[0];
            const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
            const list = dropTarget ? dropTarget.closest('.item-list, #word-bank') : null;

            if (list) {
                const basket = list.closest('.basket');
                if (basket && list.children.length >= 5) {
                    showToast("🚫 Bag full!");
                } else {
                    list.appendChild(draggedItem);
                    playSound('drop');
                }
            }
            draggedItem = null;
        }

        // 滑鼠 Drop 邏輯
        document.querySelectorAll('.item-list, #word-bank').forEach(zone => {
            zone.addEventListener('dragover', e => e.preventDefault());
            zone.addEventListener('drop', function(e){
                e.preventDefault();
                const basket = this.closest('.basket');
                if (basket && this.children.length >= 5) {
                    showToast("🚫 Bag full!");
                } else {
                    this.appendChild(draggedItem);
                    playSound('drop');
                }
            });
        });

        function showToast(m){ const t=document.getElementById('toast-notice'); t.textContent=m; t.style.top='20px'; playSound('error'); setTimeout(()=>t.style.top='-100px',2000); }

        document.getElementById('check-btn').addEventListener('click', () => {
            const items = Array.from(document.querySelectorAll('.basket .word-tag')).map(t => t.textContent);
            if(items.length===0) return;

            const scens = [
                {id:'A',t:"POWER OUTAGE", n:['flashlight','Apple watch','power bank','your phone']},
                {id:'B',t:"INJURED", n:['medicine','tissue paper','first-aid kit']},
                {id:'C',t:"THIRSTY", n:['water bottle','cola']},
                {id:'D',t:"COLD WAVE", n:['coat','raincoat','sleeping bag']},
                {id:'E',t:"HUNGRY", n:['cookie','hamburger','canned food']},
                {id:'F',t:"ESCAPE", n:['mask','shoes']},
                {id:'G',t:"PANIC", n:['plush toy','chiikawa','Nintendo Switch']},
                {id:'H',t:"RESCUE", n:['my dog','radio','whistle','your phone']}
            ];

            const s = scens[Math.floor(Math.random()*scens.length)];
            currentScenarioId = s.id;
            let win = s.n.some(n => items.includes(n));
            let desc = win ? "You survive! 🎉" : "Mission failed... 💀";
            let miracle = false;

            if(s.id==='A' && items.includes('power bank') && items.includes('your phone')) win=true;
            if(s.id==='C' && items.includes('bubble tea')) { win=false; desc="Bubble tea made you sick! 🤢"; }
            if(s.id==='G' && items.includes('Nintendo Switch')) { win=true; desc="Switch kept you happy! 🎮"; }
            
            if(win && !(items.includes('water bottle')||items.includes('medicine')||items.includes('flashlight'))) miracle=true;

            const mb = document.getElementById('modal-box');
            mb.className = 'modal-content ' + (win?'result-success':'result-fail');
            document.getElementById('result-icon').textContent = win ? "🌟" : "💀";
            document.getElementById('result-title').textContent = win ? "SUCCESS!" : "FAILED...";
            document.getElementById('result-desc').textContent = desc;
            document.getElementById('miracle-title').style.display = miracle ? 'block' : 'none';
            if(miracle) spawnConfetti();
            
            document.getElementById('revive-btn').style.display = win ? 'none' : 'block';
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-desc').style.display = 'block';
            document.getElementById('result-modal').style.display = 'flex';
            playSound(win?'win':'fail');
        });

        function spawnConfetti(){
            const c = document.getElementById('confetti-container'); c.innerHTML='';
            for(let i=0;i<50;i++){
                const d = document.createElement('div'); d.className='confetti';
                d.style.left=Math.random()*100+'vw'; d.style.backgroundColor='hsl('+Math.random()*360+',100%,50%)';
                d.style.animationDuration=(Math.random()*2+2)+'s'; c.appendChild(d);
            }
        }

        function startQuiz(){
            document.getElementById('revive-btn').style.display='none';
            document.getElementById('result-desc').style.display='none';
            document.getElementById('quiz-container').style.display='block';
            const q = quizBank[currentScenarioId];
            document.getElementById('quiz-q').textContent = q.q;
            const opts = document.getElementById('quiz-opts'); opts.innerHTML='';
            q.o.forEach((o,i)=>{
                const b = document.createElement('button'); b.className='opt-btn'; b.textContent=o;
                b.onclick = () => {
                    document.querySelectorAll('.opt-btn').forEach(bb=>bb.disabled=true);
                    if(i===q.c){ b.style.background='green'; b.style.color='white'; setTimeout(()=>{ closeModal(); showToast("Revived! 🎉"); },1000); }
                    else { b.style.background='red'; b.style.color='white'; }
                };
                opts.appendChild(b);
            });
        }

        function closeModal(){ document.getElementById('result-modal').style.display='none'; }
        document.getElementById('reset-btn').addEventListener('click', () => { 
            document.querySelectorAll('.basket .word-tag').forEach(t => document.getElementById('word-bank').appendChild(t));
            playSound('drop');
        });

        init();
    </script>
</body>
</html>
